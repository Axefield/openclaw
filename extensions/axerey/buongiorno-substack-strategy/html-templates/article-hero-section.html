<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Hero Section</title>
</head>
<body>
    <!-- ARTICLE HERO SECTION - Copy for article introductions -->
    
    <div style="max-width: 680px; margin: 0 auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;">
        
        <!-- Hero Section with Image Background -->
        <div style="background: linear-gradient(rgba(0, 0, 51, 0.85), rgba(0, 0, 51, 0.85)), url('YOUR_IMAGE_URL_HERE'); background-size: cover; background-position: center; padding: 50px 30px; border-radius: 8px; margin-bottom: 30px; border: 3px solid #C14644;">
            
            <!-- Article Category Badge -->
            <div style="margin-bottom: 15px;">
                <span style="background: #C14644; color: #ffffff; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;">
                    📂 EVIDENCE DROP
                </span>
            </div>
            
            <!-- Article Title -->
            <h1 style="color: #ffffff; font-size: 36px; font-weight: 900; margin: 0 0 20px 0; line-height: 1.2; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
                Why I'm Running for Congress: Trust, Transparency, and Taking Back Power
            </h1>
            
            <!-- Article Subtitle -->
            <p style="color: #ffffff; font-size: 20px; margin: 0 0 20px 0; line-height: 1.4; opacity: 0.95; font-weight: 400;">
                Three years ago, I sued Palm Beach County over election security. I won. Now I'm running for Congress to fix the system.
            </p>
            
            <!-- Meta Info -->
            <div style="color: #ffffff; font-size: 14px; opacity: 0.8; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 15px; margin-top: 15px;">
                <strong>Jeffrey Buongiorno</strong> | November 28, 2025 | 8 min read
            </div>
        </div>
        
    </div>
    
    <!-- END ARTICLE HERO SECTION -->
</body>
</html>
